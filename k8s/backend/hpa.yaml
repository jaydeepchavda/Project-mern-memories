apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: memories-backend-hpa

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: memories-backend

  minReplicas: 2

  maxReplicas: 5

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 70