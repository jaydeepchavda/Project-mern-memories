apiVersion: apps/v1
kind: Deployment

metadata:
  name: memories-frontend
  namespace: memories-prod 

spec:

  replicas: 2

  selector:
    matchLabels:
      app: memories-frontend
      imagePullPolicy: Always
      
  template:

    metadata:
      labels:
        app: memories-frontend

    spec:

      containers:

      - name: frontend

        image: jaydipaws/memories-frontend:latest

        ports:

        - containerPort: 80