version: "3.9"

services:

  mongo:

    image: mongo:7

    container_name: memories-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:

    build:
      context: ./server

    container_name: memories-backend

    env_file:
      - ./server/.env

    ports:
      - "5000:5000"

    depends_on:
      - mongo

  frontend:

    build:
      context: ./client

    container_name: memories-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:

  mongo_data:
