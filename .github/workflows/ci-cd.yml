name: CI Pipeline

on:
  push:
    branches:
    - main

  pull_request:
    branches:
    - main
    - PART_1_and_2

jobs:

  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest


    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      # - name: Run Gitleaks Scan
      #   uses: gitleaks/gitleaks-action@v2
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------- Backend ----------

      - name: Install Backend Dependencies
        working-directory: ./server
        run: npm install

      - name: Build Backend
        working-directory: ./server
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          fi

      # ---------- Frontend ----------

      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm install

      - name: Build Frontend
        working-directory: ./client
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build


      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}



      - name: Build Backend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/memories-backend:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/memories-backend:latest \
          ./server



      - name: Push Backend Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/memories-backend:${{ github.sha }}

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/memories-backend:latest



      - name: Build Frontend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/memories-frontend:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/memories-frontend:latest \
          ./client



      - name: Push Frontend Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/memories-frontend:${{ github.sha }}

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/memories-frontend:latest
